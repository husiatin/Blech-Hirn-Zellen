events{}

http{
    include /etc/nginx/mime.types;

    # Rate limiting with a zone of 10MB and a request rate of 10 per second
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # The fastapi server address and port
    upstream fastapi_server{
        server fastapi:8000;
    }

    server {
        # Listen on port 80 for incoming HTTP requests
        listen 80;
        
        # 🚨 NEUE/KORRIGIERTE LOCATION: Auslieferung statischer Frontend-Dateien
        location / {
            # 🚨 NEU: location innerhalb des containers an dustins pfad
            root /etc/nginx/html;
            index index.html;
            # 🚨 NEU: Versucht die Datei zu finden, sonst fallback auf index.html für Routing-Frameworks
            try_files $uri $uri/ /index.html; 
        }

        # 🚨 NEUER, KRITISCHER BLOCK: WebSocket-Proxy-Routing
        location /ws/ {
            # 🚨 NEU: Leitet alle WebSocket-Verbindungen (ws://localhost/ws/...)
            # an den FastAPI-Dienst weiter.
            proxy_pass http://fastapi_server; 

            # 🚨 NEU: Diese Header sind ZWINGEND für das WebSocket-Protokoll notwendig!
            # Sie erlauben das 'Upgrade' der Verbindung von HTTP zu WebSocket.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "http_upgrade"; // vorher nur "upgrade"
            proxy_set_header Host $host;
            # Wenn Sie X-Forwarded-For nutzen, fügen Sie es hier auch hinzu:
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            # Rate limiting allows an initial burst of 20 request. After that it is 10 request per second
            limit_req zone=api_limit burst=20;
            # Forward requests to the Uvicorn server running on port 8000 
            proxy_pass http://fastapi:8000;

            # Set headers to pass client information to the FastAPI app
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # When the OpenAPI documentation is requested via /api/docs it requests the openapi.json file documentation
        # from the url /openapi.json using a GET request.
        # The FastAPI sits behind the nginx reverse proxy because the GET request to /openapi.json doesn't work and
        # has to be rewriten into a GET request to the url /api/openapi.json.
        location /openapi.json {
            rewrite ^ /api/openapi.json last;
        }
    }
}